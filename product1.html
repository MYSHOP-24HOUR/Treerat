<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ꔛ♡ เติมเกมต่างๆ ⊹ ࣪♡</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== Animation ===== */
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* ===== Background ===== */
body{
  margin:0;
  background:linear-gradient(
    180deg,
    #d9c9ff 0%,
    #eee6ff 55%,
    #faf7ff 100%
  );
  font-family:'Kanit', sans-serif;
  text-align:center;
  animation:fadeUp .7s ease;
}

body::before{
  content:"";
  position:fixed;
  width:340px;
  height:340px;
  background:#efe6ff;
  filter:blur(140px);
  top:-120px;
  left:-120px;
  z-index:-1;
}

/* ===== Container ===== */
.container{
  max-width:400px;
  margin:auto;
  padding:30px 20px;
}

/* ===== Title ===== */
h1{
  color:white;
  font-family:'Mali', cursive;
  text-shadow:0 4px 14px rgba(0,0,0,.15);
}

h3{
  font-family:'Mali', cursive;
  color:#7b5cd6;
}

/* ===== Product Card ===== */
.product-card{
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  border-radius:22px;
  padding:18px;
  margin-bottom:22px;

  box-shadow:
    0 8px 20px rgba(0,0,0,0.10),
    inset 0 1px 1px rgba(255,255,255,0.8);
}

/* ===== Price List (ตัวแก้หลัก) ===== */
.price-list{
  margin-top:12px;
  text-align:left;
  display:flex;
  flex-direction:column;
  gap:8px;
  font-size:15px;
  color:#555;
}

.price-item{
  display:flex;
  justify-content:space-between;
  align-items:center;

  background:rgba(255,255,255,0.65);
  padding:8px 14px;
  border-radius:14px;

  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

/* ===== Button ===== */
.button{
  display:block;
  margin-top:25px;
  padding:16px;
  border-radius:22px;
  text-decoration:none;
  color:#7b5cd6;
  font-weight:500;

  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);

  box-shadow:
    0 5px 14px rgba(0,0,0,0.12),
    inset 0 1px 1px rgba(255,255,255,0.8);

  transition:.25s;
}

.button:hover{
  transform:translateY(-3px);
  background:#ffffff;
}

.button:active{
  transform:scale(0.96);
}

</style>
</head>

<body>

<div class="container">

<h1>ꔛ♡ เติมเกมต่างๆ ⊹ ࣪♡</h1>

<!-- ===== PRODUCT ===== -->
<div class="product-card">

<h3>⊹ ࣪-Free Fire ⊹ เซิร์ฟไทย</h3>

<div class="price-list">

<div class="price-item"><span>33 💎</span><span>12฿</span></div>
<div class="price-item"><span>68 💎</span><span>22฿</span></div>
<div class="price-item"><span>101 💎</span><span>33฿</span></div>
<div class="price-item"><span>136 💎</span><span>43฿</span></div>
<div class="price-item"><span>172 💎</span><span>51฿</span></div>
<div class="price-item"><span>205 💎</span><span>63฿</span></div>
<div class="price-item"><span>240 💎</span><span>70฿</span></div>
<div class="price-item"><span>310 💎</span><span>90฿</span></div>
<div class="price-item"><span>344 💎</span><span>100฿</span></div>
<div class="price-item"><span>517 💎</span><span>148฿</span></div>
<div class="price-item"><span>690 💎</span><span>198฿</span></div>
<div class="price-item"><span>1052 💎</span><span>290฿</span></div>
<div class="price-item"><span>1257 💎</span><span>341฿</span></div>
<div class="price-item"><span>1801 💎</span><span>480฿</span></div>
<div class="price-item"><span>3698 💎</span><span>960฿</span></div>

</div>

</div>

<!-- ปุ่มกลับ -->
<a class="button" href="index.html">⬅ กลับหน้าหลัก</a>

</div>

</body>
</html>
