<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>แอพพรีเมียม</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:linear-gradient(180deg,#d9c9ff,#eee6ff,#faf7ff);
font-family:'Kanit',sans-serif;
text-align:center;
}

.container{
max-width:420px;
margin:auto;
padding:30px 20px;
}

h1{
font-family:'Mali',cursive;
color:white;
text-shadow:0 4px 14px rgba(0,0,0,.15);
}

.product-card{
background:rgba(255,255,255,.9);
border-radius:22px;
padding:18px;
margin-bottom:22px;
box-shadow:0 8px 20px rgba(0,0,0,.1);
}

.price-list{
display:flex;
flex-direction:column;

}

.price-item{
display:flex;
justify-content:space-between;
background:#ffffffcc;
padding:9px 14px;
border-radius:14px;
}

.button{
display:block;
margin-top:25px;
padding:15px;
border-radius:22px;
text-decoration:none;
color:#7b5cd6;
background:white;
box-shadow:0 5px 14px rgba(0,0,0,.12);
}

</style>
</head>

<body>

</div>

</html>
