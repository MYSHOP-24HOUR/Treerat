<style>

/* ===== Animation ===== */
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* ===== Background (Soft Lilac Pastel) ===== */
body{
  margin:0;
  background:linear-gradient(
    180deg,
    #d7c2ff 0%,
    #ebe0ff 55%,
    #faf7ff 100%
  );
  font-family:'Kanit',sans-serif;
  text-align:center;
  animation:fadeUp .7s ease;
}

/* glow light */
body::before{
  content:"";
  position:fixed;
  width:340px;
  height:340px;
  background:#efe6ff;
  filter:blur(150px);
  top:-120px;
  left:-120px;
  z-index:-1;
}

/* ===== Font ===== */
h1,h2,.navbar{
  font-family:'Mali',cursive;
}

/* ===== Navbar ===== */
.navbar{
  position:sticky;
  top:0;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(15px);
  padding:15px;
  font-weight:600;
  color:#8668e6;
  box-shadow:0 3px 12px rgba(0,0,0,.08);
}

/* ===== Container ===== */
.container{
  max-width:420px;
  margin:auto;
  padding:30px 20px;
}

/* ===== Logo ===== */
.logo{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:15px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
}

/* ===== Title ===== */
h1{
  color:white;
  text-shadow:0 4px 14px rgba(0,0,0,.15);
}

/* ===== Button ===== */
.button{
  display:block;
  margin:14px 0;
  padding:16px;
  border-radius:22px;
  text-decoration:none;
  color:#8668e6;
  font-weight:500;

  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(10px);

  box-shadow:
    0 5px 14px rgba(0,0,0,0.10),
    inset 0 1px 1px rgba(255,255,255,0.9);

  transition:.25s;
}

.button:hover{
  transform:translateY(-3px);
  background:#ffffff;
}

/* ===== Footer ===== */
.footer{
  margin-top:45px;
  padding:28px;
  font-size:14px;
  color:#8668e6;
  background:rgba(255,255,255,.8);
  backdrop-filter:blur(12px);
  border-radius:30px 30px 0 0;
}

</style>
</head>
