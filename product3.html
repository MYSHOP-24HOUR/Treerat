<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ꔛ♡เติมเงินมือถือทุกเครือข่าย.𖦹₊⊹</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== Background ===== */
body{
  margin:0;
  background:linear-gradient(180deg,#d9c9ff,#eee6ff,#faf7ff);
  font-family:'Kanit',sans-serif;
  text-align:center;
}

/* glow light */
body::before{
  content:"";
  position:fixed;
  width:320px;
  height:320px;
  background:#ffffff;
  filter:blur(140px);
  top:-120px;
  left:-120px;
  z-index:-1;
}

/* ===== Layout ===== */
.container{
  max-width:420px;
  margin:auto;
  padding:28px 16px;
}

/* ===== Title ===== */
h1{
  color:white;
  font-family:'Mali',cursive;
  text-shadow:0 4px 14px rgba(0,0,0,.15);
}

h3{
  color:#7b5cd6;
  font-family:'Mali',cursive;
  margin:6px 0;
}

/* ===== Product Card (FIXED) ===== */
.product-card{
  background:rgba(255,255,255,0.96);
  border-radius:22px;
  padding:18px;
  margin-bottom:24px;

  border:1px solid rgba(0,0,0,0.06);

  box-shadow:
    0 10px 26px rgba(0,0,0,.12),
    inset 0 1px 1px rgba(255,255,255,.8);

  transition:.25s ease;
}

.product-card:hover{
  transform:translateY(-4px);
}

/* ===== Price List ===== */
.price-list{
  margin-top:14px;
  display:flex;
  flex-direction:column;
  gap:9px;
  text-align:left;
}

.price-item{
  display:flex;
  justify-content:space-between;
  align-items:center;

  background:rgba(255,255,255,.75);
  padding:10px 14px;
  border-radius:14px;

  border:1px solid rgba(0,0,0,0.04);
  font-size:15px;
}

/* ===== Button ===== */
.button{
  display:block;
  margin-top:30px;
  padding:16px;
  border-radius:24px;
  text-decoration:none;
  color:#7b5cd6;
  font-weight:500;

  background:white;

  box-shadow:
    0 8px 20px rgba(0,0,0,.12);

  transition:.25s;
}

.button:hover{
  transform:translateY(-3px);
}

.button:active{
  transform:scale(.96);
}

</style>
</head>

<body>

<div class="container">

<h1>ꔛ♡เติมเงินมือถือทุกเครือข่าย.𖦹₊⊹</h1>

<!-- ===== PRODUCT ===== -->
<div class="product-card">

<h3>⋆. 𐙚˚࿔ ยอดเติม 𝜗𝜚˚ </h3>
<h3>กรณีแจ้งเบอร์ผิดทางร้านไม่รับผิดชอบ</h3>
<div class="price-list">

<div class="price-item"><span>10฿ </span><span>ค่าบอ 1฿</span></div>
<div class="price-item"><span>20฿ </span><span>ค่าบอ 2฿</span></div>
<div class="price-item"><span>30฿ </span><span>ค่าบอ 2฿</span></div>
<div class="price-item"><span>40฿ </span><span>ค่าบอ 2฿</span></div>
<div class="price-item"><span>50฿ </span><span>ค่าบอ 2฿</span></div>
<div class="price-item"><span>60฿ </span><span>ค่าบอ 2฿</span></div>
<div class="price-item"><span>70฿ </span><span>ค่าบอ 2฿</span></div>
<div class="price-item"><span>80฿ </span><span>ค่าบอ 2฿</span></div>
<div class="price-item"><span>90฿ </span><span>ค่าบอ 2฿</span></div>
<div class="price-item"><span>100฿</span><span>ค่าบอ 3฿</span></div>
</div>

</div>

<!-- ปุ่มกลับ -->
<a class="button" href="index.html">⬅ กลับหน้าหลัก</a>

</div>

</body>
</html>
